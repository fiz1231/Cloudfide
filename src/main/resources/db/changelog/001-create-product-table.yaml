databaseChangeLog:
  - changeSet:
      id: 001-create-product-table
      author: pawel

      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: products

      changes:
        - createTable:
            tableName: products
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_products
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

              - column:
                  name: producentid
                  type: BIGINT
                  constraints:
                    nullable: true

              - column:
                  name: attributes
                  type: jsonb
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: products
            baseColumnNames: producentid
            referencedTableName: producents
            referencedColumnNames: id
            constraintName: fk_products_producent