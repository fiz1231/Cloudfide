databaseChangeLog:
  - changeSet:
      id: 001-create-producent-table
      author: pawel

      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: producents

      changes:
        - createTable:
            tableName: producents
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_producents
                    nullable: false

              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false